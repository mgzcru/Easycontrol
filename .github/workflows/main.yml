name: Build EasyControl APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x easycontrol/gradlew

      - name: Build Server
        run: cd easycontrol && ./gradlew :server:copyRelease

      - name: Build App APK
        run: cd easycontrol && ./gradlew :app:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: easycontrol-app-release
          path: easycontrol/app/build/outputs/apk/release/*.apk
