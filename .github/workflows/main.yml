name: Build Easycontrol APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Show repository files
        run: ls -la && find . -maxdepth 2 -type f | sort | head -n 200

      - name: Grant gradlew execute permission
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: easycontrol-debug-apk
          path: |
            **/build/outputs/apk/debug/*.apk
            **/build/outputs/apk/**/*.apk

      - name: Upload build reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: easycontrol-build-logs
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
